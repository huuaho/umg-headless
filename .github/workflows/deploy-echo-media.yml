name: Deploy Echo Media to SiteGround

on:
  push:
    branches: [main]
    paths:
      - 'apps/echo-media/**'
      - 'packages/**'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-echo-media]

concurrency:
  group: deploy-echo-media
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=echo-media
        env:
          NEXT_PUBLIC_WP_API_URL: ${{ secrets.EM_WP_API_URL }}
          NEXT_PUBLIC_API_MODE: wp

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.EM_FTP_SERVER }}
          username: ${{ secrets.EM_FTP_USERNAME }}
          password: ${{ secrets.EM_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./apps/echo-media/out/
          server-dir: ./echo-media.info/public_html/
          dangerous-clean-slate: true

      - name: Purge SiteGround cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EM_SSH_HOST }}
          username: ${{ secrets.EM_SSH_USERNAME }}
          password: ${{ secrets.EM_SSH_PASSWORD }}
          script: |
            curl -sSX PURGE http://127.0.0.1/* -H "Host: www.echo-media.info"
            curl -sSX PURGE http://127.0.0.1/* -H "Host: echo-media.info"
