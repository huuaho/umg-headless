name: Deploy UMG to SiteGround

on:
  push:
    branches: [main]
    paths:
      - 'apps/umg/**'
      - 'packages/**'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-umg]

concurrency:
  group: deploy-umg
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=umg
        env:
          NEXT_PUBLIC_WP_API_URL: ${{ secrets.UMG_WP_API_URL }}

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.UMG_FTP_SERVER }}
          username: ${{ secrets.UMG_FTP_USERNAME }}
          password: ${{ secrets.UMG_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./apps/umg/out/
          server-dir: ./unitedmediadc.com/public_html/

      - name: Purge SiteGround cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UMG_SSH_HOST }}
          username: ${{ secrets.UMG_SSH_USERNAME }}
          key: ${{ secrets.UMG_SSH_KEY }}
          port: 18765
          script: |
            for host in unitedmediadc.com www.unitedmediadc.com api.unitedmediadc.com unitedmedia-group.com www.unitedmedia-group.com; do
              curl -sSX PURGE http://127.0.0.1/* -H "Host: $host"
              curl -sSX PURGE https://127.0.0.1/* -H "Host: $host" -k
            done
