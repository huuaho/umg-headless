<!-- United Media Category Section Component -->
<!-- Copy everything below into a Divi Code Module -->
<!-- USAGE: Add data-category attribute to specify which category to display -->
<!-- Example: <div id="um-category-section" data-category="world-news-politics"></div> -->

<style>
/* ================================================
   Category Section Container
   ================================================ */

.um-category-section {
  max-width: 1200px;
  margin: 0 auto 60px auto;
  padding: 0 20px;
}

.um-category-section__title {
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 30px 0;
  color: #333;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 3px solid #0073aa;
  padding-bottom: 12px;
}

/* ================================================
   Two Column Layout
   ================================================ */

.um-category-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 30px;
}

@media (min-width: 768px) {
  .um-category-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.um-category-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* On mobile, reorder so featured articles appear first */
@media (max-width: 767px) {
  .um-category-grid {
    display: flex;
    flex-direction: column;
  }

  .um-category-column {
    display: contents; /* Flatten columns so cards become direct children */
  }

  .um-featured-card {
    order: -2;
  }

  .um-regular-card {
    order: -1;
  }
}

/* ================================================
   Featured Article Card (Top of Each Column)
   ================================================ */

.um-featured-card {
  position: relative;
  background: #f0f0f0;
  border-radius: 8px;
  overflow: hidden;
  height: 400px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.um-featured-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.um-featured-card__image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.um-featured-card__placeholder {
  background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
  width: 100%;
  height: 100%;
}

.um-featured-card__gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60%;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
  pointer-events: none;
}

.um-featured-card__content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 24px;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.um-featured-card__source-badge {
  display: inline-block;
  background: rgba(0, 115, 170, 0.9);
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  align-self: flex-start;
}

.um-featured-card__title {
  margin: 0;
  font-size: 24px;
  line-height: 1.3;
  font-weight: 700;
  color: #fff;
}

.um-featured-card__title a {
  color: #fff;
  text-decoration: none;
  transition: opacity 0.2s;
}

.um-featured-card__title a:hover {
  opacity: 0.8;
}

.um-featured-card__meta {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.9);
  display: flex;
  gap: 12px;
  align-items: center;
}

.um-featured-card__meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.um-featured-card__meta-read-time::before {
  content: "🕐";
  margin-right: 4px;
}

/* ================================================
   Regular Article Card (Horizontal Layout)
   ================================================ */

.um-regular-card {
  display: flex;
  gap: 16px;
  background: #fff;
  transition: opacity 0.2s;
  min-height: 140px;
}

.um-regular-card:hover {
  opacity: 0.9;
}

.um-regular-card__image-wrapper {
  flex-shrink: 0;
  width: 140px;
  height: 140px;
  position: relative;
  background: #f0f0f0;
  overflow: hidden;
  border-radius: 8px;
}

.um-regular-card__image-link {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 8px;
}

.um-regular-card__image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.um-regular-card__placeholder {
  background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
  width: 100%;
  height: 100%;
  border-radius: 8px;
}

.um-regular-card__body {
  flex: 1;
  padding: 0 16px 0 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0; /* Fix for text overflow */
}

.um-regular-card__source {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #0073aa;
  margin-bottom: 8px;
}

.um-regular-card__title {
  margin: 0 0 auto 0;
  font-size: 16px;
  line-height: 1.4;
  font-weight: 600;
  color: #333;
}

.um-regular-card__title a {
  color: inherit;
  text-decoration: none;
  transition: color 0.2s;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
}

.um-regular-card__title a:hover {
  color: #0073aa;
}

.um-regular-card__meta {
  font-size: 12px;
  color: #888;
  margin-top: 8px;
}

.um-regular-card__meta::before {
  content: "🕐";
  margin-right: 4px;
}

/* ================================================
   Loading Skeletons
   ================================================ */

.um-skeleton {
  pointer-events: none;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.um-skel-featured {
  height: 400px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 8px;
}

.um-skel-regular {
  height: 140px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 8px;
}

@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ================================================
   Empty/Error States
   ================================================ */

.um-empty-state {
  text-align: center;
  color: #666;
  font-size: 16px;
  padding: 60px 20px;
  background: #f9f9f9;
  border-radius: 8px;
}
</style>

<div class="um-category-section-container" data-category="world-news-politics">
  <!-- Component renders here -->
</div>

<script>
(function() {
  'use strict';

  /* ================================================
     Configuration
     ================================================ */

  var API_ENDPOINT = '/wp-json/um/v1/articles';
  var ARTICLES_TO_FETCH = 8; // 2 featured + 6 regular

  /* ================================================
     Category Display Names
     ================================================ */

  var CATEGORY_NAMES = {
    'world-news-politics': 'World News & Politics',
    'profiles-opinions': 'Profiles & Opinions',
    'economy-business': 'Economy & Business',
    'diplomacy': 'Diplomacy',
    'art-culture': 'Art & Culture',
    'education-youth': 'Education & Youth',
    'local-community': 'Local Community',
    'wellbeing-env-tech': 'Wellbeing, Environment, Technology'
  };

  /* ================================================
     Utilities
     ================================================ */

  function escapeHtml(text) {
    var map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  /* ================================================
     API
     ================================================ */

  function fetchArticles(category, perPage) {
    var url = API_ENDPOINT + '?category=' + encodeURIComponent(category) + '&per_page=' + perPage + '&orderby=date&order=desc';

    console.log('[UM Category Section] Fetching:', url);

    return fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        return response.json();
      })
      .then(function(data) {
        console.log('[UM Category Section] Received:', data);
        return data.items || [];
      })
      .catch(function(error) {
        console.error('[UM Category Section] Error:', error);
        throw error;
      });
  }

  /* ================================================
     Render Components
     ================================================ */

  function createFeaturedCard(article) {
    var card = document.createElement('article');
    card.className = 'um-featured-card';

    var safeTitle = escapeHtml(article.title || 'Untitled');
    var safeUrl = escapeHtml(article.source_url || '#');
    var source = escapeHtml(article.source_label || article.source || '');

    // Image
    var imgHtml = '';
    if (article.featured_image) {
      imgHtml = '<img src="' + escapeHtml(article.featured_image) + '" class="um-featured-card__image" loading="lazy" alt="' + safeTitle + '" />';
    } else {
      imgHtml = '<div class="um-featured-card__placeholder"></div>';
    }

    // Meta pieces
    var metaPieces = [];
    if (article.author_name) {
      metaPieces.push('<span>' + escapeHtml(article.author_name) + '</span>');
    }
    if (article.read_time_minutes && article.read_time_minutes > 0) {
      metaPieces.push('<span class="um-featured-card__meta-read-time">' + article.read_time_minutes + ' min read</span>');
    }
    var metaHtml = metaPieces.join(' • ');

    card.innerHTML =
      '<a href="' + safeUrl + '" target="_blank" rel="noopener" style="display: block; height: 100%;">' +
        imgHtml +
        '<div class="um-featured-card__gradient"></div>' +
        '<div class="um-featured-card__content">' +
          (source ? '<span class="um-featured-card__source-badge">' + source + '</span>' : '') +
          '<h3 class="um-featured-card__title">' +
            '<a href="' + safeUrl + '" target="_blank" rel="noopener">' + safeTitle + '</a>' +
          '</h3>' +
          (metaHtml ? '<div class="um-featured-card__meta">' + metaHtml + '</div>' : '') +
        '</div>' +
      '</a>';

    return card;
  }

  function createRegularCard(article) {
    var card = document.createElement('article');
    card.className = 'um-regular-card';

    var safeTitle = escapeHtml(article.title || 'Untitled');
    var safeUrl = escapeHtml(article.source_url || '#');
    var source = escapeHtml(article.source_label || article.source || '');

    // Image
    var imgHtml = '';
    if (article.featured_image) {
      imgHtml =
        '<a href="' + safeUrl + '" class="um-regular-card__image-link" target="_blank" rel="noopener">' +
          '<img src="' + escapeHtml(article.featured_image) + '" class="um-regular-card__image" loading="lazy" alt="' + safeTitle + '" />' +
        '</a>';
    } else {
      imgHtml = '<div class="um-regular-card__placeholder"></div>';
    }

    // Meta pieces (author + read time)
    var metaPieces = [];
    if (article.author_name) {
      metaPieces.push(escapeHtml(article.author_name));
    }
    if (article.read_time_minutes && article.read_time_minutes > 0) {
      metaPieces.push(article.read_time_minutes + ' min read');
    }
    var metaHtml = metaPieces.join(' • ');

    card.innerHTML =
      '<div class="um-regular-card__image-wrapper">' +
        imgHtml +
      '</div>' +
      '<div class="um-regular-card__body">' +
        (source ? '<div class="um-regular-card__source">' + source + '</div>' : '') +
        '<h4 class="um-regular-card__title">' +
          '<a href="' + safeUrl + '" target="_blank" rel="noopener">' + safeTitle + '</a>' +
        '</h4>' +
        (metaHtml ? '<div class="um-regular-card__meta">' + metaHtml + '</div>' : '') +
      '</div>';

    return card;
  }

  /* ================================================
     Render Section
     ================================================ */

  function renderSkeletons(container) {
    var grid = document.createElement('div');
    grid.className = 'um-category-grid';

    // Two columns with skeletons
    for (var col = 0; col < 2; col++) {
      var column = document.createElement('div');
      column.className = 'um-category-column';

      // Featured skeleton
      var featuredSkel = document.createElement('div');
      featuredSkel.className = 'um-skel-featured um-skeleton';
      column.appendChild(featuredSkel);

      // Regular skeletons
      for (var i = 0; i < 3; i++) {
        var regularSkel = document.createElement('div');
        regularSkel.className = 'um-skel-regular um-skeleton';
        column.appendChild(regularSkel);
      }

      grid.appendChild(column);
    }

    container.appendChild(grid);
  }

  function render(container, state) {
    if (!container) return;

    var categorySlug = container.getAttribute('data-category');
    var categoryTitle = CATEGORY_NAMES[categorySlug] || categorySlug;

    // Loading state
    if (state.loading && state.articles.length === 0) {
      container.innerHTML = '<h2 class="um-category-section__title">' + escapeHtml(categoryTitle) + '</h2>';
      renderSkeletons(container);
      return;
    }

    // Error state
    if (state.error) {
      container.innerHTML =
        '<h2 class="um-category-section__title">' + escapeHtml(categoryTitle) + '</h2>' +
        '<div class="um-empty-state">Unable to load articles. Please try again later.</div>';
      return;
    }

    // Empty state
    if (!state.loading && state.articles.length === 0) {
      container.innerHTML =
        '<h2 class="um-category-section__title">' + escapeHtml(categoryTitle) + '</h2>' +
        '<div class="um-empty-state">No articles available in this category yet.</div>';
      return;
    }

    // Clear container
    container.innerHTML = '';

    // Add category title
    var title = document.createElement('h2');
    title.className = 'um-category-section__title';
    title.textContent = categoryTitle;
    container.appendChild(title);

    // Create grid
    var grid = document.createElement('div');
    grid.className = 'um-category-grid';

    // Column 1: Featured 1 + regular 1, 2, 3
    var column1 = document.createElement('div');
    column1.className = 'um-category-column';

    if (state.articles[0]) {
      column1.appendChild(createFeaturedCard(state.articles[0]));
    }
    // Regular articles: 2, 3, 4 (indices in column 1)
    var regularIndices1 = [2, 3, 4];
    for (var j = 0; j < regularIndices1.length; j++) {
      var idx = regularIndices1[j];
      if (idx < state.articles.length) {
        column1.appendChild(createRegularCard(state.articles[idx]));
      }
    }

    grid.appendChild(column1);

    // Column 2: Featured 2 + regular 4, 5, 6
    var column2 = document.createElement('div');
    column2.className = 'um-category-column';

    if (state.articles[1]) {
      column2.appendChild(createFeaturedCard(state.articles[1]));
    }
    // Regular articles: 5, 6, 7 (indices in column 2)
    var regularIndices2 = [5, 6, 7];
    for (var j = 0; j < regularIndices2.length; j++) {
      var idx = regularIndices2[j];
      if (idx < state.articles.length) {
        column2.appendChild(createRegularCard(state.articles[idx]));
      }
    }

    grid.appendChild(column2);

    container.appendChild(grid);
  }

  /* ================================================
     Init - Initialize a single instance
     ================================================ */

  function initInstance(container) {
    if (!container) return;

    // Skip if already initialized
    if (container.getAttribute('data-um-initialized') === 'true') {
      return;
    }

    // Mark as initialized
    container.setAttribute('data-um-initialized', 'true');

    // Get category from data attribute
    var categorySlug = container.getAttribute('data-category');
    if (!categorySlug) {
      console.warn('[UM Category Section] No data-category attribute found', container);
      return;
    }

    // Create instance-specific state
    var instanceState = {
      category: categorySlug,
      articles: [],
      loading: false,
      error: null
    };

    console.log('[UM Category Section] Initializing for category:', categorySlug);

    // Start loading
    instanceState.loading = true;
    render(container, instanceState);

    // Fetch articles
    fetchArticles(categorySlug, ARTICLES_TO_FETCH)
      .then(function(articles) {
        instanceState.articles = articles;
        instanceState.loading = false;
        render(container, instanceState);
      })
      .catch(function(error) {
        instanceState.error = error;
        instanceState.loading = false;
        render(container, instanceState);
      });
  }

  /* ================================================
     Init All - Find and initialize all instances
     ================================================ */

  function initAll() {
    var containers = document.querySelectorAll('.um-category-section-container');
    console.log('[UM Category Section] Found', containers.length, 'instance(s)');

    for (var i = 0; i < containers.length; i++) {
      initInstance(containers[i]);
    }
  }

  /* ================================================
     Auto-init on DOM ready
     ================================================ */

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAll);
  } else {
    initAll();
  }

})();
</script>
