<!-- United Media Feed - Divi Code Module Component -->
<!-- Copy everything below this line into your Divi Code Module -->

<style>
/* ================================================
   United Media Feed Styles
   ================================================ */

.um-feed {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.um-empty {
  text-align: center;
  color: #666;
  font-size: 18px;
  padding: 40px 20px;
}

/* ================================================
   Card Styles
   ================================================ */

.um-card {
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.um-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.um-card__image-wrapper {
  display: block;
  position: relative;
  width: 100%;
  padding-bottom: 56.25%; /* 16:9 aspect ratio */
  background: #f0f0f0;
  overflow: hidden;
}

.um-card__image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.um-card__placeholder {
  background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
}

.um-card__body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.um-card__topline {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.um-card__source {
  color: #0073aa;
}

.um-card__category {
  color: #666;
}

.um-card__category::before {
  content: "•";
  margin-right: 12px;
  color: #ccc;
}

.um-card__title {
  margin: 0 0 12px 0;
  font-size: 20px;
  line-height: 1.4;
  font-weight: 700;
}

.um-card__title a {
  color: #333;
  text-decoration: none;
  transition: color 0.2s;
}

.um-card__title a:hover {
  color: #0073aa;
}

.um-card__meta {
  margin: auto 0 0 0;
  font-size: 14px;
  color: #888;
}

.um-card__meta-author {
  font-weight: 500;
}

.um-card__meta-date {
  font-style: italic;
}

/* ================================================
   Hero Card (First/Featured)
   ================================================ */

.um-card--hero {
  margin-bottom: 30px;
}

.um-card--hero .um-card__title {
  font-size: 28px;
  line-height: 1.3;
}

@media (min-width: 768px) {
  .um-card--hero {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 24px;
  }

  .um-card--hero .um-card__image-wrapper {
    padding-bottom: 0;
    height: 100%;
  }

  .um-card--hero .um-card__body {
    padding: 32px;
  }

  .um-card--hero .um-card__title {
    font-size: 32px;
  }
}

/* ================================================
   Secondary Grid
   ================================================ */

.um-secondary-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 640px) {
  .um-secondary-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .um-secondary-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ================================================
   Skeleton Loading States
   ================================================ */

.um-skeleton {
  pointer-events: none;
}

.um-skel-img {
  width: 100%;
  padding-bottom: 56.25%;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
}

.um-skel-body {
  padding: 20px;
}

.um-skel-line {
  height: 16px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 12px;
}

.um-skel-line.short {
  width: 40%;
}

.um-skel-line.mid {
  width: 70%;
}

.um-skel-line.long {
  width: 90%;
}

@keyframes skeleton-loading {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}

/* ================================================
   Load More Button
   ================================================ */

.um-load-more {
  text-align: center;
  margin-top: 40px;
}

.um-load-more__button {
  background: #0073aa;
  color: #fff;
  border: none;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.um-load-more__button:hover {
  background: #005a87;
}

.um-load-more__button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
</style>

<div id="united-media-feed" class="um-feed"></div>

<script>
(function() {
  'use strict';

  /* ================================================
     Configuration
     ================================================ */

  // API endpoint - adjust if your WordPress is in a subdirectory
  var API_ENDPOINT = '/wp-json/um/v1/articles';

  // Initial load
  var INITIAL_PER_PAGE = 20;

  /* ================================================
     State
     ================================================ */

  var state = {
    articles: [],
    page: 1,
    perPage: INITIAL_PER_PAGE,
    total: 0,
    totalPages: 0,
    loading: false,
    error: null
  };

  /* ================================================
     Utilities
     ================================================ */

  function formatDate(dateString) {
    if (!dateString) return '';
    var d = new Date(dateString);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  }

  function escapeHtml(text) {
    var map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  /* ================================================
     API
     ================================================ */

  function fetchArticles(page, perPage) {
    var url = API_ENDPOINT + '?page=' + page + '&per_page=' + perPage;

    console.log('[UM Feed] Fetching:', url);

    return fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        return response.json();
      })
      .then(function(data) {
        console.log('[UM Feed] Received:', data);
        return {
          articles: data.items || [],
          page: data.page || 1,
          perPage: data.per_page || perPage,
          total: data.total || 0,
          totalPages: data.total_pages || 0
        };
      })
      .catch(function(error) {
        console.error('[UM Feed] Error:', error);
        throw error;
      });
  }

  /* ================================================
     Skeleton Loaders
     ================================================ */

  function createSkeletonCard(isHero) {
    var card = document.createElement('article');
    card.className = 'um-card um-skeleton ' + (isHero ? 'um-card--hero' : 'um-card--secondary');

    card.innerHTML =
      '<div class="um-skel-img"></div>' +
      '<div class="um-skel-body">' +
        '<div class="um-skel-line short"></div>' +
        '<div class="um-skel-line long"></div>' +
        '<div class="um-skel-line mid"></div>' +
      '</div>';

    return card;
  }

  function renderSkeletons(container) {
    container.innerHTML = '';

    // Hero skeleton
    container.appendChild(createSkeletonCard(true));

    // Secondary skeletons
    var grid = document.createElement('div');
    grid.className = 'um-secondary-grid';

    for (var i = 0; i < 6; i++) {
      grid.appendChild(createSkeletonCard(false));
    }

    container.appendChild(grid);
  }

  /* ================================================
     Article Cards
     ================================================ */

  function createCard(article, isHero) {
    var card = document.createElement('article');
    card.className = 'um-card ' + (isHero ? 'um-card--hero' : 'um-card--secondary');

    var safeTitle = escapeHtml(article.title || 'Untitled');
    var safeUrl = escapeHtml(article.source_url || '#');
    var dateStr = formatDate(article.date);
    var source = escapeHtml(article.source_label || article.source || '');

    // Build image HTML
    var imgHtml = '';
    if (article.featured_image) {
      imgHtml =
        '<a href="' + safeUrl + '" class="um-card__image-wrapper" target="_blank" rel="noopener">' +
          '<img src="' + escapeHtml(article.featured_image) + '" class="um-card__image" loading="lazy" alt="' + safeTitle + '" />' +
        '</a>';
    } else {
      // Placeholder (gray box)
      imgHtml = '<div class="um-card__image-wrapper um-card__placeholder"></div>';
    }

    // Topline (source + category)
    var sourceHtml = source ? '<span class="um-card__source">' + source + '</span>' : '';

    // Category - would need to be added to API response
    var categoryHtml = article.category ? '<span class="um-card__category">' + escapeHtml(article.category) + '</span>' : '';

    // Meta (author + date + read time)
    var metaPieces = [];
    if (article.author_name) {
      metaPieces.push('<span class="um-card__meta-author">' + escapeHtml(article.author_name) + '</span>');
    }
    if (dateStr) {
      metaPieces.push('<span class="um-card__meta-date">' + dateStr + '</span>');
    }
    if (article.read_time_minutes && article.read_time_minutes > 0) {
      metaPieces.push('<span class="um-card__meta-read-time">' + article.read_time_minutes + ' min read</span>');
    }
    var metaHtml = metaPieces.join(' • ');

    // Build card HTML
    card.innerHTML =
      imgHtml +
      '<div class="um-card__body">' +
        '<div class="um-card__topline">' +
          sourceHtml +
          categoryHtml +
        '</div>' +
        '<h2 class="um-card__title">' +
          '<a href="' + safeUrl + '" target="_blank" rel="noopener">' + safeTitle + '</a>' +
        '</h2>' +
        (metaHtml ? '<p class="um-card__meta">' + metaHtml + '</p>' : '') +
      '</div>';

    return card;
  }

  /* ================================================
     Render
     ================================================ */

  function render() {
    var container = document.getElementById('united-media-feed');
    if (!container) return;

    // Loading state
    if (state.loading && state.articles.length === 0) {
      renderSkeletons(container);
      return;
    }

    // Error state
    if (state.error && state.articles.length === 0) {
      container.innerHTML = '<p class="um-empty">Unable to load articles. Please try again later.</p>';
      return;
    }

    // Empty state
    if (state.articles.length === 0) {
      container.innerHTML = '<p class="um-empty">No articles available yet.</p>';
      return;
    }

    // Clear container
    container.innerHTML = '';

    // Hero card (first article)
    var hero = state.articles[0];
    var heroCard = createCard(hero, true);
    container.appendChild(heroCard);

    // Secondary grid (remaining articles)
    if (state.articles.length > 1) {
      var grid = document.createElement('div');
      grid.className = 'um-secondary-grid';

      for (var i = 1; i < state.articles.length; i++) {
        grid.appendChild(createCard(state.articles[i], false));
      }

      container.appendChild(grid);
    }

    // Load more button (if more pages available)
    if (state.page < state.totalPages) {
      var loadMoreDiv = document.createElement('div');
      loadMoreDiv.className = 'um-load-more';

      var button = document.createElement('button');
      button.className = 'um-load-more__button';
      button.textContent = 'Load More';
      button.disabled = state.loading;

      button.addEventListener('click', function() {
        loadMore();
      });

      loadMoreDiv.appendChild(button);
      container.appendChild(loadMoreDiv);
    }
  }

  /* ================================================
     Actions
     ================================================ */

  function loadInitial() {
    state.loading = true;
    state.error = null;
    render();

    fetchArticles(1, state.perPage)
      .then(function(data) {
        state.articles = data.articles;
        state.page = data.page;
        state.total = data.total;
        state.totalPages = data.totalPages;
        state.loading = false;
        render();
      })
      .catch(function(error) {
        state.error = error;
        state.loading = false;
        render();
      });
  }

  function loadMore() {
    if (state.loading || state.page >= state.totalPages) return;

    state.loading = true;
    var nextPage = state.page + 1;
    render();

    fetchArticles(nextPage, state.perPage)
      .then(function(data) {
        state.articles = state.articles.concat(data.articles);
        state.page = data.page;
        state.loading = false;
        render();
      })
      .catch(function(error) {
        state.error = error;
        state.loading = false;
        render();
      });
  }

  /* ================================================
     Init
     ================================================ */

  document.addEventListener('DOMContentLoaded', function() {
    console.log('[UM Feed] Initializing...');
    loadInitial();
  });

})();
</script>
